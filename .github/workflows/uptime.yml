name: Uptime CI

# DISABLED automatic triggers until GH_PAT secret is configured.
# To re-enable: add GH_PAT (Personal Access Token with repo + workflow scope)
# in repo settings, then uncomment the schedule + push blocks below.

on:
  # schedule:
  #   - cron: "*/5 * * * *"
  repository_dispatch:
    types:
      - uptime
  workflow_dispatch:
  # push:
  #   branches:
  #     - master
  #     - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: upptime/uptime-monitor@v1
        with:
          command: "update"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
