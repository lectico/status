      - 200
  - name: Widget (Lectico Storage)
    url: https://api.lectico.com/storage/v1/object/public/widget/v1/tutor-ia-widget.js
    expectedStatusCodes:
      - 200
      - 304
  - name: Admin Panel (app.lectico.com)
    url: https://app.lectico.com
    expectedStatusCodes:
      - 200
      - 401
  - name: Marketing (lectico.com)
    url: https://lectico.com
    expectedStatusCodes:
      - 200
  - name: Documentation (docs.lectico.com)
    url: https://docs.lectico.com
    expectedStatusCodes:
      - 200
      - 503
  - name: Supabase REST (api gateway)
    url: https://byoxaihkwsjhrwbltjzb.supabase.co/rest/v1/
    expectedStatusCodes:
      - 200
      - 401

